                "content": "\u003cdiv\u003e\u003cblockquote class=\"message-block\"\u003e\u003cp\u003e\u0417\u0430\u0433\u0440\u0443\u0436\u0430\u0439 \u043d\u043e\u0432\u0443\u044e \u0432\u0435\u0440\u0441\u0438\u044e \u0441 27 \u043c\u0430\u044f\u003c/p\u003e\u003c/blockquote\u003e\u003ch2\u003e\u041a\u0430\u043a \u0441\u0442\u0430\u0442\u044c \u0438\u0441\u0442\u0438\u043d\u043d\u044b\u043c \u043c\u0430\u0441\u0442\u0435\u0440\u043e\u043c \u0432 Tanks Blitz?\u003c/h2\u003e\u003cp style=\"text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; \"\u003e\u200b\u0413\u043e\u0432\u043e\u0440\u044f\u0442, \u0447\u0442\u043e\u0431\u044b \u043f\u043e\u0431\u0435\u0436\u0434\u0430\u0442\u044c, \u043d\u0443\u0436\u043d\u043e \u043e\u0431\u0440\u0435\u0441\u0442\u0438 \u0433\u0430\u0440\u043c\u043e\u043d\u0438\u044e. \u041d\u043e \u043a\u0430\u043a\u0430\u044f \u0433\u0430\u0440\u043c\u043e\u043d\u0438\u044f, \u043a\u043e\u0433\u0434\u0430 \u0432 \u0431\u043e\u0440\u0442 \u043b\u0435\u0442\u0438\u0442 \u0444\u0443\u0433\u0430\u0441, \u0430 \u0432\u043e\u043a\u0440\u0443\u0433 \u0432\u0437\u0440\u044b\u0432\u0430\u044e\u0442\u0441\u044f \u0431\u043e\u0435\u043a\u043e\u043c\u043f\u043b\u0435\u043a\u0442\u044b? \u0414\u0430-\u0430, \u043d\u0430\u0439\u0442\u0438 \u0434\u0437\u0435\u043d \u0432 \u0442\u0430\u043a\u0438\u0445 \u0443\u0441\u043b\u043e\u0432\u0438\u044f\u0445 \u2014 \u0437\u0430\u0434\u0430\u0447\u0430 \u043d\u0435\u043f\u0440\u043e\u0441\u0442\u0430\u044f. \u041f\u043e\u044d\u0442\u043e\u043c\u0443 \u0432 \u044d\u0442\u043e\u043c \u043c\u0435\u0441\u044f\u0446\u0435 \u043c\u044b \u0440\u0435\u0448\u0438\u043b\u0438 \u043f\u043e\u043c\u043e\u0447\u044c \u0442\u0435\u0431\u0435 \u0441 \u043f\u043e\u0438\u0441\u043a\u043e\u043c \u0432\u043d\u0443\u0442\u0440\u0435\u043d\u043d\u0435\u0433\u043e \u0440\u0430\u0432\u043d\u043e\u0432\u0435\u0441\u0438\u044f. \u041d\u043e \u0447\u0442\u043e\u0431\u044b \u0434\u043e\u0441\u0442\u0438\u0447\u044c \u0438 \u0443\u0434\u0435\u0440\u0436\u0430\u0442\u044c \u0435\u0433\u043e, \u043f\u0440\u0438\u0434\u0451\u0442\u0441\u044f \u0445\u043e\u0440\u043e\u0448\u0435\u043d\u044c\u043a\u043e \u0437\u0430\u043a\u0430\u043b\u0438\u0442\u044c \u0434\u0443\u0445 \u0438 \u0442\u0435\u043b\u043e. \u0411\u043b\u0430\u0433\u043e \u0432 \u0438\u044e\u043d\u0435 \u0434\u043b\u044f \u044d\u0442\u043e\u0433\u043e \u0431\u0443\u0434\u0435\u0442 \u0432\u0441\u0451 \u043d\u0435\u043e\u0431\u0445\u043e\u0434\u0438\u043c\u043e\u0435: \u0442\u0435\u0431\u044f \u0436\u0434\u0451\u0442 \u043a\u0440\u0443\u0442\u043e\u0439 \u042d\u043f\u0438\u0437\u043e\u0434, \u043a\u0443\u0447\u0430 \u0441\u043e\u0431\u044b\u0442\u0438\u0439, \u043a\u0432\u0435\u0441\u0442\u044b \u0438 \u0430\u043a\u0442\u0438\u0432\u043d\u043e\u0441\u0442\u0438. \u0414\u0430\u0432\u0430\u0439 \u043f\u0440\u043e\u0439\u0434\u0435\u043c\u0441\u044f \u043f\u043e \u043e\u0441\u043d\u043e\u0432\u043d\u044b\u043c \u043f\u0443\u043d\u043a\u0442\u0430\u043c.\u003c/p\u003e\u003cp style=\"text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; \"\u003e\u003cimg src=\"//cdn-ptl-media.tanksblitz.ru/media/filer_public/images/divider_lotus.png\"\u003e\u003c/p\u003e\u003ch2\u003e\u003cstrong\u003e1. \u041f\u043e\u0433\u0440\u0443\u0436\u0435\u043d\u0438\u0435 \u0432 \u0430\u0442\u043c\u043e\u0441\u0444\u0435\u0440\u0443\u003c/strong\u003e\u003c/h2\u003e\u003cp style=\"text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; text-align: justify; \"\u003e\u0418\u0441\u0442\u0438\u043d\u043d\u044b\u0439 \u043c\u0430\u0441\u0442\u0435 function timeAgo(dateString) {
    if (!dateString) return '';
    
    const now = new Date();
    const past = new Date(dateString);
    const diffMs = now - past;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHours = Math.floor(diffMin / 60);
    const diffDays = Math.floor(diffHours / 24);
    const diffMonths = Math.floor(diffDays / 30);
    const diffYears = Math.floor(diffDays / 365);
    
    function pluralize(number, one, two, five) {
        const n = Math.abs(number) % 100;
        const n1 = n % 10;
        if (n > 10 && n < 20) return five;
        if (n1 > 1 && n1 < 5) return two;
        if (n1 === 1) return one;
        return five;
    }
    
    if (diffYears >= 2) {
        return diffYears + ' ' + pluralize(diffYears, 'год', 'года', 'лет') + ' назад';
    } else if (diffYears >= 1) {
        return 'год назад';
    } else if (diffMonths >= 2) {
        return diffMonths + ' ' + pluralize(diffMonths, 'месяц', 'месяца', 'месяцев') + ' назад';
    } else if (diffMonths >= 1) {
        return 'месяц назад';
    } else if (diffDays >= 7) {
        const weeks = Math.floor(diffDays / 7);
        return weeks + ' ' + pluralize(weeks, 'неделя', 'недели', 'недель') + ' назад';
    } else if (diffDays >= 2) {
        return diffDays + ' ' + pluralize(diffDays, 'день', 'дня', 'дней') + ' назад';
    } else if (diffDays >= 1) {
        return 'вчера';
    } else if (diffHours >= 2) {
        return diffHours + ' ' + pluralize(diffHours, 'час', 'часа', 'часов') + ' назад';
    } else if (diffHours >= 1) {
        return 'час назад';
    } else if (diffMin >= 2) {
        return diffMin + ' ' + pluralize(diffMin, 'минута', 'минуты', 'минут') + ' назад';
    } else if (diffMin >= 1) {
        return 'минуту назад';
    } else if (diffSec >= 5) {
        return diffSec + ' ' + pluralize(diffSec, 'секунда', 'секунды', 'секунд') + ' назад';
    } else {
        return 'только что';
    }
}
