    "content": "<div><p style=\"text-align: justify; \">В ближайшее время в Tanks Blitz изменятся некоторые привычные способы входа в игру: <strong>Apple ID</strong>, <strong>Apple Game Center</strong> и <strong>Google ID</strong> больше не будут доступны. Чтобы не потерять весь заработанный прогресс, заранее проверь, что у тебя настроен хотя бы один из классических способов авторизации.</p><p style=\"text-align: justify; \"><br></p><h4 style=\"text-align: justify\"><strong>Если играешь на телефоне:</strong></h4><p style=\"text-align: justify; \">Ты всегда сможешь зайти в игру, введя почту и пароль. Только не забудь привязать аккаунт к <strong>Леста ID</strong>! Узнать, как это сделать, <a href=\"https://lesta.ru/support/ru/products/tb/article/15393/\">можно здесь</a>.</p><p><br></p><h4><strong>Если играешь на ПК:</strong></h4><p class=\"p1\">В этом случае у тебя есть целых 3 способа входа в игру:</p><ul><li><p>по номеру телефона и паролю;</p></li><li><p>по почте и паролю;</p></li><li><p>через VK ID или Яндекс ID.</p></li></ul><p>Выбирай самый подходящий для себя вариант — и вперёд, в бой!</p><h2><strong>А еще можно золото забрать!</strong></h2><p style=\"text-align: justify; \" class=\"p1\">Заботиться о безопасности профиля не только правильно, но и выгодно.</p><p style=\"text-align: justify; \" class=\"p1\">Например, если ты до сих пор играешь на демо-аккаунте (что это такое, можешь <a href=\"https://lesta.ru/support/ru/products/tb/article/15391/\">узнать здесь</a>) — переведи его в полноценный профиль, привязав к Леста ID, и забирай <currency count=\"250\" type=\"gold\"></currency>.</p><p style=\"text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; \" class=\"p1\">____________________________</p><p style=\"text-align: justify; \" class=\"p1\">Отдельный бонус подготовлен за привязку номера телефона. Это ещё сильнее защитит твои данные, упростит вход в аккаунт, а заодно принесёт тебе <currency count=\"250\" type=\"gold\"></currency> (инструкцию оставили <a href=\"https://lesta.ru/support/ru/products/tb/article/22882/\">здесь</a>).</p><blockquote class=\"message-block message-important\"><p style=\"text-align: justify; \" class=\"p1\"><strong>Обрати внимание:</strong><span style=\"color: rgb(255, 255, 255); font-size: 16px; font-family: Jost, Arial, Helvetica CY, Helvetica, sans-serif; font-size: 16px\"> бонус начисляется </span><strong>только за первую привязку</strong><span style=\"color: rgb(255, 255, 255); font-size: 16px; font-family: Jost, Arial, Helvetica CY, Helvetica, sans-serif; font-size: 16px\"> номера. Если ты уже привязывал телефон и получал бонус, повторно награда не начисляется. </span></p></blockquote><p style=\"text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; text-align: center; \"><blitzbutton text=\" Привязать номер телефона\" variant=\"default\" is-external-link=\"true\" link=\"https://lesta.ru/personal/\" is-cart-icon=\"false\"></blitzbutton></p><hr><h2><strong>Мы всегда на связи</strong></h2><p style=\"text-align: justify; \" class=\"p2\"><strong>Если возникли вопросы или что-то пошло не так, наш Центр поддержки всегда готов помочь. Оставить заявку ты всегда </strong><a href=\"https://lesta.ru/support/ru/products/tb/help/27374/27380/27384/\"><strong>можешь здесь</strong></a><strong>.</strong></p></div>",

<script>

    function renderMainGrid(config) {
        const container = document.getElementById('news-grid-container');
        if (!container) return;

        container.innerHTML = '';
        container.className = 'b4r-grid b4r-grid__type-' + (config.gridType || 2);

        const sortedItems = [...config.items].sort((a, b) => a.position - b.position);

        sortedItems.forEach(item => {
            const gridItem = document.createElement('div');
            gridItem.className = 'b4r-grid_item b4r-grid_item__' + item.position;
            gridItem.id = 'grid-item-' + item.id;
            gridItem.innerHTML = generateMainGridItemHTML(item);
            container.appendChild(gridItem);
        });
    }

    function renderNewsList(config) {
        const container = document.getElementById('news-list-container');
        if (!container) return;

        const itemsToShow = config.items.slice(0, config.maxItems || 5);
        let html = '';

        itemsToShow.forEach(item => {
            html += generateNewsListItemHTML(item);
        });

        container.innerHTML = `
            <h2 class="news-list_heading">
                <span>${config.title || 'Последние записи'}</span>
            </h2>
            <div>
                ${html}
                <div class="section-more news-list_section-more">
                    <a href="${config.viewAllLink || '/ru/news/'}">
                        <a data-v-55dd706e="" class="button-container button-container-secondary">
                            <i data-v-55dd706e="" class="button-border left-btn-bg"></i>
                            <div data-v-55dd706e="" class="button">${config.viewAllText || 'Посмотреть все записи'}</div>
                            <i data-v-55dd706e="" class="button-border right-btn-bg"></i>
                        </a>
                    </a>
                </div>
            </div>
        `;
    }

    function generateMainGridItemHTML(item) {
        let categoryHTML = '';
        if (item.category) {
            categoryHTML = `
                <div class="news-info news-b4r_news-info">
                    <a href="${item.category.link}" class="news-info_tag">
                        <span class="news-info_tag-text">${item.category.name}</span>
                        <span class="news-info_tag-text">${item.category.name}</span>
                    </a>
                    ${item.showTimer ? '<span class="timer-container" data-timer-end="' + item.timerEnd + '"></span>' : ''}
                </div>
            `;
        }

        return `
            <div class="news-b4r b4r-grid_news-b4r">
                <div class="news-b4r_img" style="background-image: url('${item.image}');"></div>
                <div class="news-b4r_content">
                    <h3 class="news-b4r_heading">${item.title}</h3>
                    <p class="news-b4r_description">${item.description}</p>
                    ${categoryHTML}
                </div>
                <a href="${item.link}" target="${item.target || '_self'}" class="news-b4r_link"></a>
            </div>
        `;
    }

    function generateNewsListItemHTML(item) {
        let timerHTML = '';
        if (item.showTimer) {
            timerHTML = '<span class="timer-container" data-timer-end="' + item.timerEnd + '"></span>';
        }

        return `
            <div class="news-list_item">
                <div class="news-annotation">
                    <div class="news-annotation_img" style="background-image: url('${item.image}');"></div>
                    <div class="news-annotation_content">
                        <div class="news-annotation_header">
                            <span class="news-annotation_heading">${item.title}</span>
                            <span class="news-annotation_text">${item.description}</span>
                        </div>
                        <div class="news-info news-annotation_news-info">
                            <a href="${item.category?.link || '#'}" class="news-info_tag">
                                <span class="news-info_tag-text">${item.category?.name || ''}</span>
                                <span class="news-info_tag-text">${item.category?.name || ''}</span>
                            </a>
                            ${timerHTML}
                        </div>
                    </div>
                    <a href="${item.link}" class="news-annotation_link"></a>
                </div>
            </div>
        `;
    }

    function initTimers() {
        const containers = document.querySelectorAll('.timer-container[data-timer-end]');

        containers.forEach(container => {
            const endTime = new Date(container.getAttribute('data-timer-end')).getTime();
            
            function updateTimer() {
                const now = Date.now();
                const remaining = endTime - now;

                if (remaining > 0) {
                    const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
                    container.innerHTML = days + ' д ' + hours + ' ч ' + minutes + ' мин ' + seconds + ' сек';
                } else {
                    container.innerHTML = 'Событие завершено';
                    container.style.color = '#999';
                }
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        renderMainGrid(window.newsData.mainGrid);
        renderNewsList(window.newsData.newsList);
        setTimeout(initTimers, 100);
    });
</script>
